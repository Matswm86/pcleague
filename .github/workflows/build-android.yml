name: Build Android APK

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

env:
  APK_NAME: pcleague

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required SDK packages
        run: sdkmanager --install "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Restore (or generate) debug keystore
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_DEBUG_KEYSTORE_BASE64 }}
        run: |
          set -e
          mkdir -p ~/.android
          if [ -n "$KEYSTORE_B64" ]; then
            echo "Using stable keystore from ANDROID_DEBUG_KEYSTORE_BASE64 secret"
            echo -n "$KEYSTORE_B64" | base64 -d > ~/.android/debug.keystore
          else
            echo "Secret not set — generating ephemeral keystore (signature changes per build)"
            keytool -genkeypair -v \
              -keystore ~/.android/debug.keystore \
              -alias androiddebugkey \
              -storepass android -keypass android \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US" \
              -storetype PKCS12
          fi
          keytool -list -keystore ~/.android/debug.keystore -storepass android | grep -E "fingerprint|type" | head -3

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: Stage APK
        run: |
          set -e
          cp app/build/outputs/apk/debug/app-debug.apk "${APK_NAME}.apk"
          ls -la "${APK_NAME}.apk"

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_NAME }}-apk
          path: ${{ env.APK_NAME }}.apk
          retention-days: 30

      - name: Update rolling "latest" release (main pushes)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest build (rolling)
          prerelease: true
          body: |
            Auto-built APK from the latest `main` commit (${{ github.sha }}).
            Sideload only — debug-signed, not for store distribution. If
            reinstalling over a build with a different signature, uninstall first.
          files: ${{ env.APK_NAME }}.apk
          fail_on_unmatched_files: true

      - name: Create tagged release (vX.Y.Z tags)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: |
            PcLeague ${{ github.ref_name }}. Sideload, debug-signed.
          files: ${{ env.APK_NAME }}.apk
          fail_on_unmatched_files: true
